<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/cards.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Destinos</a></li>
                <li><a href="#">Agendas</a></li>
                <li><a href="#">Precios</a></li>
            </ul>
        </nav>

        <section class="hero" id="hero">
            <video autoplay loop muted playsinline class="video-hero">
                <source src="../recursos/videos/destinos.mp4" type="video/mp4">
            </video>
            <div class="hero-contenido">
                <h1>Explora el mundo</h1>
                <p>Descubre los mejores destinos turísticos</p>
            </div>
        </section>

        <section class="contenedor-cards">
            <article class="card">
                <img src="../recursos/imagenes/tokio.webp" alt="">
                <div class="card-body">
                    <h3>Tokio</h3>
                    <p>Disfruta de la ciudad de los templos y la tecnología</p>
                </div>
            </article>

            <article class="card">
                <img src="../recursos/imagenes/paris.jpg" alt="">
                <div class="card-body">
                    <h3>Paris</h3>
                    <p>Disfruta de la ciudad de la moda y el arte</p>
                </div>
            </article>

            <article class="card">
                <img src="../recursos/imagenes/monaco.jpg" alt="">
                <div class="card-body">
                    <h3>Monaco</h3>
                    <p>Disfruta de la ciudad de las carreras y los yates</p>
                </div>
            </article>
        </section>
    </header>

</body>

</html>
